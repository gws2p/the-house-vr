<html>
  <head>
    <title>THE HOUSE - V1.0</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene physics="gravity: -9.8">
      
      <a-assets>
        <img id="rock-texture" src="rock.jpg">
        <a-asset-item id="glove-model" src="glove.glb"></a-asset-item>
      </a-assets>

      <a-entity id="rig" position="0 1.6 0">
        <a-camera look-controls wasd-controls></a-camera>
        <a-entity id="leftHand" laser-controls="hand: left"></a-entity>
        <a-entity id="rightHand" laser-controls="hand: right"></a-entity>
      </a-entity>

      <a-sphere radius="50" 
                material="src: #rock-texture; side: double" 
                position="0 0 0">
      </a-sphere>

      <a-entity gltf-model="#glove-model" 
                position="2 1 -3" 
                scale="1 1 1">
      </a-entity>

      <a-light type="ambient" color="#fff"></a-light>
      <a-light type="directional" position="-1 1 1" intensity="0.5"></a-light>

    </a-scene>
  </body>
</html>
