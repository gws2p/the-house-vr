<!DOCTYPE html>
<html>
  <head>
    <title>THE HOUSE - V1.0 PERFORMANCE</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    
    <a-scene background="color: #111111">
      
      <a-assets timeout="15000">
        <img id="rock-texture" src="rock.jpg">
        <a-asset-item id="glove-model" src="glove.glb"></a-asset-item>
      </a-assets>

      <a-entity id="rig" position="0 0 0" movement-controls="fly: false; speed: 0.2">
        <a-entity camera look-controls position="0 1.6 0">
          <a-text value="Loading Assets Safely..." position="-1 0.5 -2" color="yellow" width="4"></a-text>
        </a-entity>
        <a-entity id="leftHand" hand-controls="hand: left"></a-entity>
        <a-entity id="rightHand" hand-controls="hand: right"></a-entity>
      </a-entity>

      <a-plane rotation="-90 0 0" width="50" height="50" color="#222222"></a-plane>

      <a-sphere radius="40" 
                src="#rock-texture" 
                segments-width="16"
                segments-height="16"
                side="double" 
                position="0 0 0">
      </a-sphere>

      <a-entity gltf-model="#glove-model" 
                position="0 1.2 -3" 
                scale="0.03 0.03 0.03">
      </a-entity>

      <a-light type="ambient" intensity="1.0" color="#ffffff"></a-light>
      <a-light type="directional" position="1 3 1" intensity="0.5"></a-light>

    </a-scene>

  </body>
</html>
