<!DOCTYPE html>
<html>
  <head>
    <title>THE HOUSE - SPORTS CAVE V1.1</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    
    <a-scene background="color: #111111">
      
      <a-assets>
        <img id="custom-rock" src="rock.jpg">
        <a-asset-item id="glove-model" src="glove.glb"></a-asset-item>
      </a-assets>

      <a-entity id="rig" position="0 0 0">
        <a-camera look-controls wasd-controls="acceleration: 20" position="0 1.6 0">
          <a-text value="The House - Sports Cave" position="-1 0.5 -2" color="yellow" width="4"></a-text>
        </a-camera>
        
        <a-entity id="leftHand" laser-controls="hand: left"></a-entity>
        <a-entity id="rightHand" laser-controls="hand: right"></a-entity>
      </a-entity>

      <a-plane rotation="-90 0 0" 
               width="30" 
               height="30" 
               color="#222222"
               gridhelper="size: 30; divisions: 30">
      </a-plane>

      <a-sphere radius="15" 
                src="#custom-rock" 
                material="repeat: 4 4; side: double"
                position="0 0 0">
      </a-sphere>

      <a-entity gltf-model="#glove-model" 
                position="0 1 -2" 
                scale="0.05 0.05 0.05">
      </a-entity>

      <a-light type="ambient" intensity="1.0" color="#ffffff"></a-light>
      <a-light type="directional" position="1 3 1" intensity="0.5"></a-light>

    </a-scene>

  </body>
</html>
